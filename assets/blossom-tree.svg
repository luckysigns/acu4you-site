<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 240" preserveAspectRatio="none" aria-hidden="true">
  <defs>
    <!-- single plum/cherry blossom: 5 petals around a centre -->
    <g id="fl">
      <circle cx="0" cy="-7" r="5.4" />
      <circle cx="6.7" cy="-2.2" r="5.4" />
      <circle cx="4.1" cy="5.7" r="5.4" />
      <circle cx="-4.1" cy="5.7" r="5.4" />
      <circle cx="-6.7" cy="-2.2" r="5.4" />
    </g>
    <g id="bloom">
      <use href="#fl" fill="#e79fae" />
      <circle r="2.6" fill="#c96f83" />
    </g>
    <g id="bloomLight">
      <use href="#fl" fill="#f3cfd6" />
      <circle r="2.4" fill="#dd93a3" />
    </g>
    <g id="bud">
      <circle r="3.6" fill="#c96f83" />
      <circle cx="2.5" cy="-2.5" r="2.2" fill="#e79fae" />
    </g>
    <!-- cluster of blossoms -->
    <g id="cluster">
      <use href="#bloom" transform="translate(0 0)" />
      <use href="#bloomLight" transform="translate(15 -8) scale(.82)" />
      <use href="#bloom" transform="translate(-13 -10) scale(.72)" />
      <use href="#bud" transform="translate(9 9)" />
    </g>
    <g id="clusterSm">
      <use href="#bloomLight" transform="scale(.8)" />
      <use href="#bloom" transform="translate(-11 -7) scale(.62)" />
      <use href="#bud" transform="translate(8 6) scale(.9)" />
    </g>
  </defs>

  <!-- faint background branch for depth -->
  <g stroke="#8a6f58" stroke-width="5" fill="none" stroke-linecap="round" opacity=".22">
    <path d="M -20 40 C 260 90 520 30 830 66 C 1120 98 1360 40 1620 66" />
    <path d="M 500 42 q 60 -22 130 -18" />
    <path d="M 1150 62 q 70 -30 150 -26" />
  </g>
  <g opacity=".28">
    <use href="#clusterSm" transform="translate(300 60) scale(.9)" />
    <use href="#clusterSm" transform="translate(640 38)" />
    <use href="#clusterSm" transform="translate(1010 72) scale(.85)" />
    <use href="#clusterSm" transform="translate(1330 40)" />
  </g>

  <!-- trunk entering from bottom-left -->
  <path d="M -30 250 C 20 205 55 175 105 143 C 130 127 160 112 195 103"
        fill="none" stroke="#4b3629" stroke-width="22" stroke-linecap="round" />
  <path d="M -18 250 C 30 215 70 185 118 152"
        fill="none" stroke="#3d2b20" stroke-width="9" stroke-linecap="round" opacity=".55" />

  <!-- main branch sweeping right -->
  <path d="M 180 106 C 320 78 460 96 620 84 C 780 72 900 98 1060 84 C 1220 70 1380 94 1520 80 C 1560 76 1590 74 1625 70"
        fill="none" stroke="#4b3629" stroke-width="11" stroke-linecap="round" />
  <path d="M 180 106 C 320 80 460 98 620 86"
        fill="none" stroke="#4b3629" stroke-width="14" stroke-linecap="round" />
  <path d="M 1060 84 C 1220 70 1380 94 1520 80 C 1560 76 1590 74 1625 70"
        fill="none" stroke="#4b3629" stroke-width="8" stroke-linecap="round" />

  <!-- upper twigs with blossom clusters -->
  <g fill="none" stroke="#4b3629" stroke-linecap="round">
    <path d="M 250 92 Q 268 58 300 48" stroke-width="5" />
    <path d="M 470 92 Q 486 62 520 52" stroke-width="5" />
    <path d="M 700 82 Q 716 52 752 44" stroke-width="5" />
    <path d="M 905 88 Q 918 60 950 50" stroke-width="4.5" />
    <path d="M 1120 80 Q 1138 50 1172 42" stroke-width="4.5" />
    <path d="M 1330 86 Q 1348 56 1384 48" stroke-width="4.5" />
    <path d="M 1508 80 Q 1524 58 1556 50" stroke-width="4" />
    <path d="M 585 88 q -10 -26 -34 -34" stroke-width="4" />
    <path d="M 1015 86 q -10 -24 -32 -32" stroke-width="4" />
  </g>
  <use href="#cluster" transform="translate(304 46)" />
  <use href="#cluster" transform="translate(524 50) scale(.92)" />
  <use href="#cluster" transform="translate(756 42)" />
  <use href="#clusterSm" transform="translate(953 48)" />
  <use href="#cluster" transform="translate(1176 40) scale(.9)" />
  <use href="#clusterSm" transform="translate(1388 46)" />
  <use href="#clusterSm" transform="translate(1558 48) scale(.85)" />
  <use href="#clusterSm" transform="translate(549 52) scale(.8)" />
  <use href="#clusterSm" transform="translate(981 52) scale(.75)" />
  <use href="#bloomLight" transform="translate(214 88) scale(.7)" />
  <use href="#bloom" transform="translate(662 80) scale(.65)" />
  <use href="#bloomLight" transform="translate(1258 78) scale(.65)" />

  <!-- hanging twigs that meet the menu links (x = 128, 336, 544, 752, 960, 1168, 1376) -->
  <g fill="none" stroke="#4b3629" stroke-linecap="round">
    <path d="M 138 112 Q 124 120 128 134" stroke-width="4.5" />
    <path d="M 342 90 Q 330 116 336 148" stroke-width="4.5" />
    <path d="M 550 86 Q 538 106 544 134" stroke-width="4.5" />
    <path d="M 758 86 Q 746 114 752 148" stroke-width="4.5" />
    <path d="M 966 86 Q 954 106 960 134" stroke-width="4.5" />
    <path d="M 1174 78 Q 1162 110 1168 148" stroke-width="4.5" />
    <path d="M 1382 90 Q 1370 108 1376 134" stroke-width="4.5" />
  </g>
  <g fill="#c96f83">
    <circle cx="128" cy="134" r="3" />
    <circle cx="336" cy="148" r="3" />
    <circle cx="544" cy="134" r="3" />
    <circle cx="752" cy="148" r="3" />
    <circle cx="960" cy="134" r="3" />
    <circle cx="1168" cy="148" r="3" />
    <circle cx="1376" cy="134" r="3" />
  </g>

  <!-- drifting petals -->
  <g fill="#eeb7c2" opacity=".8">
    <ellipse cx="420" cy="150" rx="5" ry="2.8" transform="rotate(-24 420 150)" />
    <ellipse cx="875" cy="140" rx="4.6" ry="2.6" transform="rotate(18 875 140)" />
    <ellipse cx="1290" cy="150" rx="5" ry="2.8" transform="rotate(-30 1290 150)" />
    <ellipse cx="655" cy="170" rx="4.2" ry="2.4" transform="rotate(40 655 170)" />
    <ellipse cx="1470" cy="128" rx="4.4" ry="2.5" transform="rotate(-12 1470 128)" />
    <ellipse cx="230" cy="150" rx="4" ry="2.3" transform="rotate(30 230 150)" />
  </g>
</svg>
